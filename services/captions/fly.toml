app = "easybits-captions"
primary_region = "dfw"

[build]

[env]
  PORT = "8080"
  NODE_ENV = "production"

[http_service]
  internal_port = 8080
  force_https = false
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    grace_period = "120s"
    method = "GET"
    path = "/health"
    timeout = "10s"

[[vm]]
  size = "performance-2x"
  memory = "8gb"
