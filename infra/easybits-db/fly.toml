app = "easybits-db"
primary_region = "dfw"

[build]
  dockerfile = "Dockerfile"

[mounts]
  source = "easybits_db_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[services]]
  protocol = "tcp"
  internal_port = 9090

  [[services.ports]]
    port = 9090

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
