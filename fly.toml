app = 'easybits'
primary_region = 'dfw'

# Grace window on deploy/restart: SIGTERM → wait up to this before SIGKILL. The
# WhatsApp pool surface uses it to DRAIN — let in-flight agent turns finish so a
# deploy doesn't cut a reply mid-stream (Fly's default is only 5s). See the drain
# handler in app/.server/integrations/whatsapp/baileys.server.ts.
kill_timeout = '30s'

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    interval = "30s"
    grace_period = "15s"
    method = "GET"
    path = "/api/health"
    timeout = "5s"

[[vm]]
  size = 'shared-cpu-2x'
  memory = '2gb'
